                    <span class="bg-white px-5 py-2 rounded-lg shadow-sm text-4xl border border-pink-200 text-pink-700">${hints[0] || ''}</span>
                    <span class="text-4xl text-pink-300 self-center">+</span>
                    <span class="bg-white px-5 py-2 rounded-lg shadow-sm text-4xl border border-pink-200 text-pink-700">${hints[1] || ''}</span>
                </div>
            `;
            document.getElementById('quiz-a').innerHTML = '';
            
            currentQuizAnswer = form[3];
            currentQuizMeta = `包含變形：<span class="text-pink-600 font-black">${form[0]}</span> (${form[1]})`;
            
            document.getElementById('btn-show-ans').classList.remove('hidden');
        }

        function showAnswer() {
            if(!currentQuizAnswer) return;
            document.getElementById('quiz-a').innerHTML = `
                <div class="text-lg text-stone-500 font-bold mb-2 w-full text-left pl-4">參考答案：</div>
                <div class="text-4xl font-black text-pink-700 animate-fadeIn bg-pink-50 w-full py-8 px-4 rounded-xl border border-pink-200">${currentQuizAnswer}</div>
                <div class="text-2xl text-stone-600 font-medium mt-4">${currentQuizMeta}</div>
            `;
            document.getElementById('btn-show-ans').classList.add('hidden');
        }

        // 啟動
        window.onload = init;
    </script>
</body>
</html>
